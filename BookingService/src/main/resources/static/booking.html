<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hotel Booking</title>
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f0f4f8; min-height: 100vh;
      display: flex; align-items: center; justify-content: center; padding: 30px 20px;
    }
    .card {
      background: white; border-radius: 20px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1); width: 100%; max-width: 500px; overflow: hidden;
    }
    .steps { display: flex; padding: 20px 32px; border-bottom: 1px solid #f0f0f0; }
    .step-item { flex: 1; display: flex; flex-direction: column; align-items: center; position: relative; }
    .step-item:not(:last-child)::after {
      content: ''; position: absolute; top: 16px; left: 60%;
      width: 80%; height: 2px; background: #e0e0e0; z-index: 0;
    }
    .step-item.done:not(:last-child)::after { background: #2ecc71; }
    .step-circle {
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; z-index: 1;
      border: 2px solid #e0e0e0; background: white; color: #aaa; transition: all 0.3s;
    }
    .step-item.active .step-circle { border-color: #2d6a9f; background: #2d6a9f; color: white; }
    .step-item.done .step-circle { border-color: #2ecc71; background: #2ecc71; color: white; }
    .step-label { font-size: 10px; color: #aaa; margin-top: 6px; font-weight: 500; }
    .step-item.active .step-label { color: #2d6a9f; font-weight: 600; }
    .step-item.done .step-label { color: #2ecc71; }
    .body { padding: 28px 32px; }
    .form-section { display: none; }
    .form-section.active { display: block; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 11px; font-weight: 600; color: #555; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 6px; }
    input, select {
      width: 100%; padding: 11px 14px; border: 1.5px solid #e0e0e0;
      border-radius: 10px; font-size: 14px; color: #333; background: #fafafa; outline: none; transition: all 0.2s;
    }
    input:focus, select:focus { border-color: #2d6a9f; background: white; box-shadow: 0 0 0 3px rgba(45,106,159,0.1); }
    .btn { width: 100%; padding: 13px; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.25s; margin-top: 6px; }
    .btn-primary { background: linear-gradient(135deg, #2d6a9f, #1e3a5f); color: white; }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(45,106,159,0.3); }
    .btn-pay { background: linear-gradient(135deg, #2ecc71, #27ae60); color: white; }
    .btn-pay:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(46,204,113,0.3); }
    .btn-back { background: #f5f5f5; color: #666; font-size: 13px; margin-top: 10px; }
    .btn-back:hover { background: #eee; }
    .summary-box { background: #f8faff; border: 1.5px solid #e0eaf5; border-radius: 14px; padding: 18px; margin-bottom: 18px; }
    .srow { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #eef2f8; font-size: 13px; }
    .srow:last-child { border-bottom: none; }
    .srow .sl { color: #777; }
    .srow .sv { color: #222; font-weight: 600; }
    .total-row {
      background: linear-gradient(135deg, #e8f5e9, #c8e6c9); border-radius: 10px;
      padding: 14px 16px; display: flex; justify-content: space-between; align-items: center; margin-top: 10px;
    }
    .total-row .tl { font-size: 14px; font-weight: 700; color: #1b5e20; }
    .total-row .tv { font-size: 22px; font-weight: 800; color: #1b5e20; }
    /* ── Loyalty box ── */
    .loyalty-box {
      display: none; /* JS will show it when points >= 300 */
      background: #fffde7; border: 1.5px solid #ffe082;
      border-radius: 14px; padding: 14px 18px; margin-bottom: 14px;
    }
    .loyalty-inner { display: flex; justify-content: space-between; align-items: center; }
    .loyalty-title { font-size: 13px; font-weight: 700; color: #f57f17; }
    .loyalty-sub { font-size: 12px; color: #888; margin-top: 3px; }
    .loyalty-check { display: flex; align-items: center; gap: 8px; cursor: pointer; }
    .loyalty-check input[type=checkbox] { width: 18px; height: 18px; cursor: pointer; }
    .loyalty-check span { font-size: 13px; font-weight: 600; color: #555; }
    /* ── rest ── */
    .success-wrap { text-align: center; padding: 10px 0; }
    .success-icon {
      width: 80px; height: 80px; background: linear-gradient(135deg, #2ecc71, #27ae60);
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-size: 36px; margin: 0 auto 16px; box-shadow: 0 8px 30px rgba(46,204,113,0.35); animation: pop 0.4s ease;
    }
    @keyframes pop { 0% { transform: scale(0.5); opacity: 0; } 80% { transform: scale(1.1); } 100% { transform: scale(1); opacity: 1; } }
    .success-wrap h2 { font-size: 20px; font-weight: 800; color: #1b5e20; margin-bottom: 6px; }
    .success-wrap p { font-size: 13px; color: #888; margin-bottom: 20px; }
    .result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 18px; text-align: left; }
    .ritem { background: #f8f9fa; border: 1px solid #eee; border-radius: 10px; padding: 12px 14px; }
    .ritem.hi { background: linear-gradient(135deg, #e8f5e9, #f1f8e9); border-color: #a5d6a7; }
    .ritem .rl { font-size: 10px; font-weight: 600; color: #999; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 4px; }
    .ritem .rv { font-size: 14px; font-weight: 700; color: #333; }
    .ritem.hi .rv { color: #2e7d32; }
    .badge { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; }
    .bc { background: #e8f5e9; color: #2e7d32; }
    .bp { background: #e3f2fd; color: #1565c0; }
    .err { background: #fff5f5; border: 1px solid #ffcdd2; border-radius: 10px; padding: 11px 14px; color: #c62828; font-size: 13px; margin-bottom: 14px; display: none; }
    .loading { display: none; text-align: center; padding: 14px 0; }
    .spinner { width: 34px; height: 34px; border: 3px solid #e0e0e0; border-top: 3px solid #2d6a9f; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 10px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading p { color: #888; font-size: 13px; }
  </style>
</head>
<body>

<div class="card">
  <div class="steps">
    <div class="step-item active" id="si1"><div class="step-circle">1</div><div class="step-label">Details</div></div>
    <div class="step-item" id="si2"><div class="step-circle">2</div><div class="step-label">Summary</div></div>
    <div class="step-item" id="si3"><div class="step-circle">✓</div><div class="step-label">Confirmed</div></div>
  </div>

  <div class="body">

    <!-- Step 1 -->
    <div class="form-section active" id="step1">
      <div class="form-row">
        <div class="form-group"><label>User ID</label><input type="number" id="userId" value="1"></div>
        <div class="form-group"><label>Hotel ID</label><input type="number" id="hotelId" value="1"></div>
      </div>
      <div class="form-group"><label>Room ID</label><input type="number" id="roomId" value="2"></div>
      <div class="form-row">
        <div class="form-group"><label>Check-In</label><input type="date" id="checkIn"></div>
        <div class="form-group"><label>Check-Out</label><input type="date" id="checkOut"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Amount (₹)</label><input type="number" id="amount" value="1500"></div>
        <div class="form-group">
          <label>Payment Method</label>
          <select id="paymentMethod">
            <option value="CREDIT_CARD">Credit Card</option>
            <option value="DEBIT_CARD">Debit Card</option>
            <option value="UPI" selected>UPI</option>
            <option value="NET_BANKING">Net Banking</option>
            <option value="WALLET">Wallet</option>
          </select>
        </div>
      </div>
      <div class="err" id="err1"></div>
      <div class="loading" id="load1"><div class="spinner"></div><p>Creating order...</p></div>
      <button class="btn btn-primary" onclick="createOrder()">Continue to Payment →</button>
    </div>

    <!-- Step 2 -->
    <div class="form-section" id="step2">
      <div class="summary-box" id="summaryBox"></div>

      <!-- Loyalty box — hidden by default, shown by JS when points >= 300 -->
      <div class="loyalty-box" id="loyaltyBox">
        <div class="loyalty-inner">
          <div>
            <div class="loyalty-title">🎁 Loyalty Points</div>
            <div class="loyalty-sub">
              You have <strong id="pointsDisplay">0</strong> pts —
              redeem 300 for <strong>10% off</strong>
            </div>
          </div>
          <label class="loyalty-check">
            <input type="checkbox" id="redeemCheckbox">
            <span>Use Points</span>
          </label>
        </div>
      </div>

      <div class="err" id="err2"></div>
      <div class="loading" id="load2"><div class="spinner"></div><p>Verifying payment...</p></div>
      <button class="btn btn-pay" onclick="openRazorpay()">💳 Pay with Razorpay</button>
      <button class="btn btn-back" onclick="goToStep(1)">← Back</button>
    </div>

    <!-- Step 3 -->
    <div class="form-section" id="step3">
      <div class="success-wrap">
        <div class="success-icon">✓</div>
        <h2>Booking Confirmed!</h2>
        <p>Your room has been successfully booked.</p>
        <div class="result-grid" id="resultGrid"></div>
        <button class="btn btn-primary" onclick="newBooking()">+ New Booking</button>
      </div>
    </div>

  </div>
</div>

<script>
  const BASE         = 'http://localhost:8083';
  const LOYALTY_BASE = 'http://localhost:8085';

  let orderData = null;
  let currentUserId = null; // FIX: shared variable so confirmBooking can access it

  // Default dates
  const d1 = new Date(); d1.setDate(d1.getDate() + 30);
  const d2 = new Date(d1); d2.setDate(d2.getDate() + 3);
  document.getElementById('checkIn').value  = d1.toISOString().split('T')[0];
  document.getElementById('checkOut').value = d2.toISOString().split('T')[0];

  // ── Helpers ────────────────────────────────────────────────────────
  function showErr(id, msg) { const e = document.getElementById(id); e.textContent = msg; e.style.display = 'block'; }
  function hideErr(id)      { document.getElementById(id).style.display = 'none'; }
  function showLoad(id)     { document.getElementById(id).style.display = 'block'; }
  function hideLoad(id)     { document.getElementById(id).style.display = 'none'; }

  function goToStep(n) {
    document.querySelectorAll('.form-section').forEach(s => s.classList.remove('active'));
    document.getElementById('step' + n).classList.add('active');
    for (let i = 1; i <= 3; i++) {
      const el = document.getElementById('si' + i);
      el.className = 'step-item';
      if (i < n) el.classList.add('done');
      else if (i === n) el.classList.add('active');
    }
  }

  // ── Step 1: Create Order ───────────────────────────────────────────
  async function createOrder() {
    hideErr('err1');
    const userId        = document.getElementById('userId').value;
    const roomId        = document.getElementById('roomId').value;
    const hotelId       = document.getElementById('hotelId').value;
    const checkIn       = document.getElementById('checkIn').value;
    const checkOut      = document.getElementById('checkOut').value;
    const amount        = document.getElementById('amount').value;
    const paymentMethod = document.getElementById('paymentMethod').value;

    if (!userId || !roomId || !hotelId || !checkIn || !checkOut || !amount) {
      showErr('err1', 'Please fill in all fields.'); return;
    }
    if (new Date(checkOut) <= new Date(checkIn)) {
      showErr('err1', 'Check-out must be after check-in.'); return;
    }

    showLoad('load1');
    try {
      const res = await fetch(`${BASE}/api/bookings/create-order`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-User-Id': userId, 'X-User-Role': 'ROLE_GUEST' },
        body: JSON.stringify({
          userId: parseInt(userId), roomId: parseInt(roomId), hotelId: parseInt(hotelId),
          checkInDate: checkIn, checkOutDate: checkOut, amount: parseFloat(amount), paymentMethod
        })
      });
      const data = await res.json();
      hideLoad('load1');
      if (!res.ok) { showErr('err1', data.message || 'Failed to create order.'); return; }

      orderData     = data;
      currentUserId = userId; // FIX: store so confirmBooking can use it

      const nights = Math.ceil((new Date(checkOut) - new Date(checkIn)) / 86400000);
      document.getElementById('summaryBox').innerHTML = `
        <div class="srow"><span class="sl">Hotel ID</span><span class="sv">#${hotelId}</span></div>
        <div class="srow"><span class="sl">Room ID</span><span class="sv">#${roomId}</span></div>
        <div class="srow"><span class="sl">Check-In</span><span class="sv">${checkIn}</span></div>
        <div class="srow"><span class="sl">Check-Out</span><span class="sv">${checkOut}</span></div>
        <div class="srow"><span class="sl">Duration</span><span class="sv">${nights} night${nights > 1 ? 's' : ''}</span></div>
        <div class="srow"><span class="sl">Payment Method</span><span class="sv">${paymentMethod.replace('_', ' ')}</span></div>
        <div class="total-row">
          <span class="tl">Total Amount</span>
          <span class="tv" id="totalAmountDisplay">₹${parseFloat(amount).toLocaleString('en-IN')}</span>
        </div>
        <div class="srow" id="discountRow" style="display:none; background:#e8f5e9; border-radius:8px; padding:6px 10px; margin-top:6px;">
          <span class="sl" style="color:#2e7d32;">🎉 Loyalty Discount (10%)</span>
          <span class="sv" style="color:#2e7d32;">-₹${(parseFloat(amount) * 0.10).toLocaleString('en-IN')}</span>
        </div>
      `;

      // ── Loyalty balance check ──────────────────────────────────────
      document.getElementById('loyaltyBox').style.display = 'none';
      document.getElementById('redeemCheckbox').checked   = false;
      try {
        const loyaltyRes = await fetch(`${LOYALTY_BASE}/api/loyalty/balance`, {
          headers: { 'X-User-Id': userId, 'X-User-Role': 'ROLE_GUEST' }
        });
        if (loyaltyRes.ok) {
          const points = await loyaltyRes.json();
          if (points >= 300) {
            document.getElementById('pointsDisplay').textContent = points;
            document.getElementById('loyaltyBox').style.display  = 'block';

            // ── Live amount update on checkbox toggle ──────────────
            const originalAmount  = parseFloat(amount);
            const discountedAmount = +(originalAmount * 0.90).toFixed(2);

            document.getElementById('redeemCheckbox').onchange = (e) => {
              const active = e.target.checked;
              const displayAmount = active ? discountedAmount : originalAmount;
              document.getElementById('totalAmountDisplay').textContent =
                '₹' + displayAmount.toLocaleString('en-IN');
              document.getElementById('discountRow').style.display = active ? 'flex' : 'none';
            };
            // ───────────────────────────────────────────────────────
          }
        }
      } catch (_) { /* non-critical — loyalty box stays hidden */ }
      // ──────────────────────────────────────────────────────────────

      goToStep(2);
    } catch (e) {
      hideLoad('load1');
      showErr('err1', 'Could not connect to server. Make sure backend is running on port 8083.');
    }
  }

  // ── Step 2: Open Razorpay ──────────────────────────────────────────
  function openRazorpay() {
    hideErr('err2');
    new Razorpay({
      key:       orderData.keyId,
      amount:    orderData.amount * 100,
      currency:  orderData.currency,
      order_id:  orderData.razorpayOrderId,
      name:      'Hotel Booking',
      description: `Room #${orderData.roomId}`,
      theme:     { color: '#2d6a9f' },
      prefill:   { name: 'Guest', email: 'guest@hotel.com', contact: '9999999999' },
      handler:   async (r) => { showLoad('load2'); await confirmBooking(r); },
      modal:     { ondismiss: () => showErr('err2', 'Payment cancelled. Please try again.') }
    }).open();
  }

  // ── Step 3: Confirm Booking ────────────────────────────────────────
  async function confirmBooking(r) {
    const redeemPoints = document.getElementById('redeemCheckbox').checked;

    try {
      const res = await fetch(`${BASE}/api/bookings/confirm`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-User-Id':   currentUserId,   // FIX: use shared variable, not undefined local
          'X-User-Role': 'ROLE_GUEST'
        },
        body: JSON.stringify({
          userId:              orderData.userId,
          roomId:              orderData.roomId,
          hotelId:             orderData.hotelId,
          checkInDate:         orderData.checkInDate,
          checkOutDate:        orderData.checkOutDate,
          amount:              orderData.amount,
          paymentMethod:       orderData.paymentMethod,
          razorpayOrderId:     r.razorpay_order_id,
          razorpayPaymentId:   r.razorpay_payment_id,
          razorpaySignature:   r.razorpay_signature,
          redeemPoints:        redeemPoints
        })
      });
      const data = await res.json();
      hideLoad('load2');
      if (!res.ok) { showErr('err2', data.message || 'Verification failed.'); return; }

      document.getElementById('resultGrid').innerHTML = `
        <div class="ritem hi"><div class="rl">Booking ID</div><div class="rv">#${data.bookingId}</div></div>
        <div class="ritem hi"><div class="rl">Payment ID</div><div class="rv">#${data.paymentId}</div></div>
        <div class="ritem"><div class="rl">Booking Status</div><div class="rv"><span class="badge bc">${data.bookingStatus}</span></div></div>
        <div class="ritem"><div class="rl">Payment Status</div><div class="rv"><span class="badge bp">${data.paymentStatus}</span></div></div>
        <div class="ritem"><div class="rl">Amount Paid</div><div class="rv">₹${parseFloat(data.amount).toLocaleString('en-IN')}</div></div>
        <div class="ritem"><div class="rl">Method</div><div class="rv">${data.paymentMethod.replace('_', ' ')}</div></div>
      `;
      goToStep(3);
    } catch (e) {
      hideLoad('load2');
      showErr('err2', 'Failed to confirm booking.');
    }
  }

  function newBooking() {
    orderData     = null;
    currentUserId = null;
    document.getElementById('roomId').value = '';
    goToStep(1);
  }
</script>

</body>
</html>
